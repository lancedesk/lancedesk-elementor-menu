name: Feature request
description: Suggest an improvement or new capability
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea. Clear use cases help us prioritize.

  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What limitation or pain point are you facing?
      placeholder: "I'm always frustrated when..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred behavior or UX.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternatives you've tried.

  - type: textarea
    id: use_case
    attributes:
      label: Real-world use case
      description: Explain where this would help in production.
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Mockups, links, screenshots, or related issues.
