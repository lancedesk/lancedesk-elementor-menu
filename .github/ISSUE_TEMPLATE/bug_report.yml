name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting an issue. Please provide enough detail to reproduce it.

  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      placeholder: "e.g. 1.0.1"
    validations:
      required: true

  - type: input
    id: wordpress_version
    attributes:
      label: WordPress version
      placeholder: "e.g. 6.6"
    validations:
      required: true

  - type: input
    id: elementor_version
    attributes:
      label: Elementor version
      placeholder: "e.g. 3.x"
    validations:
      required: true

  - type: input
    id: theme
    attributes:
      label: Active theme
      placeholder: "Theme name and version"

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps so we can reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Console errors or logs (if any)
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add screenshots, videos, or links if helpful.
